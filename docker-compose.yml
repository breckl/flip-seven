services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flipseven
      POSTGRES_PASSWORD: flipseven
      POSTGRES_DB: flipseven
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flipseven -d flipseven"]
      interval: 2s
      timeout: 5s
      retries: 15
